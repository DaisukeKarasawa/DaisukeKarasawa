# Profile Tetrass — 自動SVG更新
# アクションのSHA更新: 各リポジトリで `git ls-remote <url> refs/tags/<tag>` などで取得し、
# 下記の `uses: org/repo@<40桁SHA>` を置き換える。

name: Profile Tetrass

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

concurrency:
  group: profile-tetrass-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Generate Tetrass SVGs
        uses: DaisukeKarasawa/tetrass/action@a13faed1fd2b8eb27ab97fa0cf7edbf4620eec2e
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            img/tetrass.svg
            img/tetrass-dark.svg?palette=github-dark

      - name: Upload SVG artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tetrass-svgs
          path: |
            img/tetrass.svg
            img/tetrass-dark.svg

  commit:
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: true

      - name: Download SVG artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: tetrass-svgs
          path: .

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore: update Tetrass SVGs"
          file_pattern: |
            img/tetrass.svg
            img/tetrass-dark.svg
